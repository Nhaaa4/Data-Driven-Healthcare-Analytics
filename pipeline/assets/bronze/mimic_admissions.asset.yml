name: bronze.mimic_admissions
type: ingestr
connection: healthcare_bq

parameters:
  source_connection: healthcare_gcs
  source_table: "de-zoomcamp-493207-healthcare-lake/admissions/*.parquet"
  destination: bigquery
  file_type: parquet
  incremental_strategy: replace
  partition_by: admittime
  cluster_by: subject_id,hadm_id
  loader_file_format: parquet
  enforce_schema: true

columns:
  - name: row_id
    type: integer
    checks:
      - name: not_null
      - name: unique

  - name: subject_id
    type: integer
    checks:
      - name: not_null

  - name: hadm_id
    type: integer
    checks:
      - name: not_null
      - name: unique

  - name: admittime
    type: timestamp
    checks:
      - name: not_null

  - name: dischtime
    type: timestamp

  - name: deathtime
    type: timestamp

  - name: admission_type
    type: string

  - name: admission_location
    type: string

  - name: discharge_location
    type: string

  - name: insurance
    type: string

  - name: language
    type: string

  - name: religion
    type: string

  - name: marital_status
    type: string

  - name: ethnicity
    type: string

  - name: diagnosis
    type: string

  - name: hospital_expire_flag
    type: integer
    checks:
      - name: accepted_values
        value: [0, 1]

  - name: has_chartevents_data
    type: integer
    checks:
      - name: accepted_values
        value: [0, 1]
