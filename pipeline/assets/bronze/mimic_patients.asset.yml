name: bronze.mimic_patients
type: ingestr
connection: healthcare_bq

parameters:
  source_connection: healthcare_gcs
  source_table: "de-zoomcamp-493207-healthcare-lake/patients/*.parquet"
  destination: bigquery
  file_type: parquet
  incremental_strategy: replace
  cluster_by: subject_id
  loader_file_format: parquet
  enforce_schema: true

columns:
  - name: row_id
    type: integer
    checks:
      - name: not_null
      - name: unique

  - name: subject_id
    type: integer
    checks:
      - name: not_null
      - name: unique

  - name: gender
    type: string
    checks:
      - name: accepted_values
        value: [M, F]

  - name: dob
    type: timestamp
    checks:
      - name: not_null

  - name: dod
    type: timestamp

  - name: expire_flag
    type: integer
    checks:
      - name: accepted_values
        value: [0, 1]
