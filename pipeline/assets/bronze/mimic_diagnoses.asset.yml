name: bronze.mimic_diagnoses
type: ingestr
connection: healthcare_bq

parameters:
  source_connection: healthcare_gcs
  source_table: "de-zoomcamp-493207-healthcare-lake/diagnoses_icd/*.parquet"
  destination: bigquery
  file_type: parquet
  incremental_strategy: replace
  cluster_by: subject_id,hadm_id,icd9_code
  loader_file_format: parquet
  enforce_schema: true

columns:
  - name: row_id
    type: integer
    checks:
      - name: not_null
      - name: unique

  - name: subject_id
    type: integer
    checks:
      - name: not_null

  - name: hadm_id
    type: integer
    checks:
      - name: not_null

  - name: seq_num
    type: integer
    checks:
      - name: positive
      
  - name: icd9_code
    type: string
    checks:
      - name: not_null
