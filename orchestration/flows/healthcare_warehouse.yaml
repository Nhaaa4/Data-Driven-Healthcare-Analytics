id: healthcare_warehouse
namespace: zoomcamp.project
description: Run the healthcare warehouse Bruin pipeline.

inputs:
  - id: environment
    type: STRING
    defaults: default
  - id: workers
    type: INT
    defaults: 8

variables:
  bruin_project_dir: /workspace/healthcare_warehouse/bruin
  bruin_config_file: /workspace/healthcare_warehouse/bruin/.bruin.kestra.yml
  pipeline_path: /workspace/healthcare_warehouse/bruin/pipeline/pipeline.yml

tasks:
  - id: set_labels
    type: io.kestra.plugin.core.execution.Labels
    labels:
      pipeline: healthcare-warehouse
      orchestrator: kestra

  - id: verify_files
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - test -f "{{ render(vars.bruin_config_file) }}"
      - test -f "{{ render(vars.pipeline_path) }}"

  - id: validate_pipeline
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd "{{ render(vars.bruin_project_dir) }}"
      - export BRUIN_CONFIG_FILE="{{ render(vars.bruin_config_file) }}"
      - bruin validate "{{ render(vars.pipeline_path) }}"

  - id: run_pipeline
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - cd "{{ render(vars.bruin_project_dir) }}"
      - export BRUIN_CONFIG_FILE="{{ render(vars.bruin_config_file) }}"
      - bruin run "{{ render(vars.pipeline_path) }}" --environment "{{ inputs.environment }}" --workers "{{ inputs.workers }}"

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 2 * * *"
    inputs:
      environment: default
      workers: 8
